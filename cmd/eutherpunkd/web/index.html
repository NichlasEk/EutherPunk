<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EutherPunk</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="Chattar">
        <div class="sidebarHead">
          <strong>Chattar</strong>
          <button id="newChatButton" type="button">Ny</button>
        </div>
        <div id="conversationList" class="conversationList"></div>
      </aside>

      <section class="topbar" aria-label="Status">
        <div>
          <h1 id="chatTitle">EutherPunk</h1>
          <p id="status">Ansluter...</p>
        </div>
        <div class="actions">
          <a class="navLink" href="/">EutherHost</a>
          <a class="download" href="/downloads/eutherpunk-cli/linux-amd64">CLI</a>
          <button id="settingsButton" type="button" title="Inställningar">⚙</button>
          <button id="serverVoiceToggle" type="button">Serverröst av</button>
          <button id="voiceToggle" type="button">TTS av</button>
        </div>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chatForm" class="composer">
        <button id="micButton" class="icon" type="button" title="Prata">Mic</button>
        <button id="imageButton" class="icon" type="button" title="Lägg till bild">Bild</button>
        <input id="imageInput" type="file" accept="image/*" multiple hidden>
        <div class="inputStack">
          <div id="imagePreview" class="imagePreview" aria-live="polite"></div>
          <textarea id="prompt" rows="2" placeholder="Skriv till EutherPunk..."></textarea>
        </div>
        <button type="submit">Skicka</button>
      </form>
    </main>

    <dialog id="settingsDialog" class="settingsDialog">
      <form id="settingsForm" method="dialog">
        <div class="settingsHead">
          <strong>Inställningar</strong>
          <button id="settingsCloseButton" type="button" aria-label="Stäng">×</button>
        </div>
        <label>
          Chatmodell
          <input id="chatModelInput" name="chat_model" autocomplete="off">
        </label>
        <label>
          Visionmodell
          <input id="visionModelInput" name="vision_model" autocomplete="off">
        </label>
        <label>
          Bildmodell
          <select id="imageModelSelect" name="image_model"></select>
        </label>
        <label>
          Bild-LoRA
          <select id="imageLoraSelect" name="image_lora"></select>
        </label>
        <label>
          TTS-backend
          <input id="voiceBackendInput" name="voice_backend" autocomplete="off">
        </label>
        <div class="settingsActions">
          <button id="promptAdminButton" type="button">Prompt-TOML</button>
          <button id="settingsSaveButton" type="submit">Spara</button>
        </div>
      </form>
    </dialog>
    <dialog id="promptAdminDialog" class="settingsDialog promptAdminDialog">
      <form id="promptAdminForm" method="dialog">
        <div class="settingsHead">
          <strong>Prompt-TOML</strong>
          <button id="promptAdminCloseButton" type="button" aria-label="Stäng">×</button>
        </div>
        <p id="promptAdminPath" class="settingsHint"></p>
        <textarea id="promptAdminText" rows="18" spellcheck="false"></textarea>
        <div class="settingsActions">
          <button id="promptAdminReloadButton" type="button">Ladda om</button>
          <button id="promptAdminSaveButton" type="submit">Spara TOML</button>
        </div>
      </form>
    </dialog>
    <script src="/web/app.js?v=20260623-mobile-image-input"></script>
  </body>
</html>
